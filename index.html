<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤑 หารกัน - คอร์ทแบด</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="candy.png?v=2" type="image/png">
</head>
<body>
    <div class="container">
        <h1>🏸 หารค่าแบด</h1>
        
        <div class="card">
            <h3>🏸 ข้อมูลสนามและลูกแบด</h3>
            <div class="input-group">
                <label>ค่าคอร์ท (บาท/ชม.)</label>
                <input type="number" id="courtPrice" value="180">
            </div>
            <div class="input-group">
                <label>เวลาที่จองคอร์ท (ชม.)</label>
                <input type="number" id="courtHours" placeholder="เช่น 2" step="0.5">
            </div>
            <hr>
            <div class="input-row">
                <div class="input-group">
                    <label>ราคาลูกแบด (บาท/กระป๋อง)</label>
                    <input type="number" id="shuttleTubePrice" placeholder="เช่น 560">
                </div>
                <div class="input-group">
                    <label>จำนวนลูก (ต่อกระป๋อง)</label>
                    <input type="number" id="shuttlesPerTube" value="12">
                </div>
            </div>
            <div class="input-group">
                <label>จำนวนลูกที่ใช้จริง (ลูก)</label>
                <input type="number" id="shuttleCountUsed" placeholder="เช่น 3">
            </div>
        </div>

        <div class="card">
            <h3>💳 ข้อมูลการโอนเงิน</h3>
            <div class="input-group">
                <label>ธนาคาร / พร้อมเพย์</label>
                <input type="text" id="bankName" placeholder="เช่น กสิกรไทย">
            </div>
            <div class="input-group">
                <label>เลขบัญชี / เบอร์โทร</label>
                <input type="text" id="bankAccount" placeholder="012-3-45678-9">
            </div>
            <div class="input-group">
                <label>ชื่อคนรับเงินหลัก (คนจ่ายค่าคอร์ท)</label>
                <select id="receiverSelect">
                    <option value="external">-- คนนอก (ไม่ได้เล่นด้วย) --</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>👥 รายชื่อคนเล่น</h3>
            <div id="playersList"></div>
            <button class="btn-add" onclick="addPlayer()">+ เพิ่มคนเล่น</button>
        </div>

        <button class="btn-calc" onclick="calculate()">🧮 คำนวณยอด</button>

        <div id="resultSection" class="hidden">
            <h3>📊 สรุปยอดแบบละเอียด</h3>
            <div class="table-responsive">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>ชื่อ</th>
                            <th>เวลา</th>
                            <th>ค่าเล่น</th>
                            <th>สำรองจ่าย</th>
                            <th>ยอดโอน / รับคืน</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <h3>📝 ข้อความสรุปสำหรับส่งในแชท</h3>
            <textarea id="summaryText" rows="10" readonly></textarea>
            <button class="btn-copy" onclick="copyText()">📋 ก๊อปปี้ข้อความ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
